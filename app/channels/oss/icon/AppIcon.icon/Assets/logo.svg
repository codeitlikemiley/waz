<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hexagon Gradient (Electric Pink to Amber Orange) -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#ffaa00" />
    </linearGradient>

    <!-- Blue Wave Gradient (Cyan to Deep Blue) -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0055ff" />
    </linearGradient>

    <!-- Orange Wave Gradient (Yellow to Dark Orange) -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffaa00" />
      <stop offset="100%" stop-color="#ff3300" />
    </linearGradient>
  </defs>

  <!-- Outer Hexagon -->
  <path d="M 256,46 L 438,151 L 438,361 L 256,466 L 74,361 L 74,151 Z" 
        fill="none" 
        stroke="url(#hexGrad)" 
        stroke-width="26" 
        stroke-linejoin="round" />

  <!-- Wave Group (centered and aligned) -->
  <g transform="translate(18, 0)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Blue Wave Segment -->
    <path d="M 90,256 L 120,256 C 145,256 155,170 175,170 C 195,170 205,340 225,340 C 240,340 250,110 266,110" 
          fill="none" 
          stroke="url(#blueGrad)" 
          stroke-width="20" />

    <!-- Orange Wave Segment -->
    <path d="M 266,110 C 278,110 288,340 305,340 C 325,340 335,256 360,256 L 390,256" 
          fill="none" 
          stroke="url(#orangeGrad)" 
          stroke-width="20" />

    <!-- Vertical pill dashes (Blue/Cyan) -->
    <rect x="135" y="235" width="16" height="40" rx="8" fill="url(#blueGrad)" />
    <rect x="195" y="165" width="16" height="60" rx="8" fill="url(#blueGrad)" />

    <!-- Vertical pill dashes (Orange) -->
    <rect x="265" y="275" width="16" height="60" rx="8" fill="url(#orangeGrad)" />
    <rect x="325" y="215" width="16" height="40" rx="8" fill="url(#orangeGrad)" />
  </g>
</svg>
